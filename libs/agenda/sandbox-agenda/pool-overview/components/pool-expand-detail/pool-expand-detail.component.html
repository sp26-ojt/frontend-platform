@if (data) {
  <div class="block-content">

    <!-- Resources utilization - compact horizontal -->
    @if (data.usedSize > 0 && data.resources) {
      <div class="ped-resources">
        @for (resource of displayedResources; track resource; let i = $index) {
          @if (data.resources?.quotas[resource]) {
            <div class="resource-item">
              <span class="resource-label">{{ data.resources.quotas[resource].name }}</span>
              <crczp-resource-bar
                [quota]="data.resources.quotas[resource]"
                [poolUsage]="data[resource + 'Utilization']"
                [color]="resourceColors[i]">
              </crczp-resource-bar>
              <span class="resource-pct">{{ data[resource + 'Utilization'].toFixed(1) }}%</span>
            </div>
          }
        }
      </div>
    }

    <!-- Queue Management -->
    <div class="ped-queue-section">
      <crczp-queue-management
        [poolId]="data.id"
        [poolName]="data.title"
        [currentUserId]="currentUserId">
      </crczp-queue-management>
    </div>

  </div>
}
